[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/upstox/*"
  to = "https://api.upstox.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/yfinance/quotes"
  to = "/.netlify/functions/yfinance-quotes"
  status = 200

[[redirects]]
  from = "/api/yfinance/history"
  to = "/.netlify/functions/yfinance-history"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
